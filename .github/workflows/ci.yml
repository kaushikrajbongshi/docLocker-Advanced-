name: CI

on:
  push:
    branches:
      - main
      - release
      - "feature/**"

  pull_request:
    branches:
      - main
      - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          JWT_SECRET: test-secret
          GEMINI_API_KEY: dummy
          MONGODB_URI_ATLAS: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          USE_BULLMQ: false
          NEXT_PUBLIC_USE_BULLMQ: false